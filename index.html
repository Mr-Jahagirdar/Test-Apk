<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Our Premium App</title>
    <style>
        /* Modern Mesh Gradient Background */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(at 0% 0%, #764ba2 0%, transparent 50%),
                        radial-gradient(at 100% 0%, #667eea 0%, transparent 50%),
                        radial-gradient(at 100% 100%, #89f7fe 0%, transparent 50%),
                        radial-gradient(at 0% 100%, #66a6ff 0%, transparent 50%);
            background-color: #667eea;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 50px 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            color: white;
            animation: fadeIn 0.8s ease-out;
        }

        /* Image Styling with Floating Animation */
        .hero-image {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 40px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* High-Conversion Download Button */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #4facfe;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .download-btn:hover {
            transform: scale(1.05);
            background: #4facfe;
            color: white;
            box-shadow: 0 15px 30px rgba(79, 172, 254, 0.4);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Version Badge */
        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="glass-card">
    
    <img src="Code Snippet Vault logo design.png" alt="App Icon" class="hero-image">
    
    <h1>Download Code Snippet Vault</h1>
    <p>Experience the future of productivity. Secure, lightweight, and incredibly fast.</p>
    
    <a href="app-debug.apk" download="Code_Snippet_Vault.apk" class="download-btn">
        Download APK
    </a>
</div>

</body>
</html>
